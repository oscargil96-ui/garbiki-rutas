    WILSON:[{name:"SANSEBAY",zone:"Estella zona",er:""},{name:"PAKELEKU",zone:"Estella zona",er:""},{name:"LANDABEN",zone:"Pamplona",er:""}],
    JUAN:[{name:"CASA LUISA",zone:"Ayegui",er:""},{name:"CASA JUAN",zone:"Ayegui",er:""},{name:"CASA CERIO",zone:"Azqueta",er:""},{name:"CAROL AGREDA",zone:"Estella",er:""},{name:"FLORIDA",zone:"Estella",er:""},{name:"CLINICA DENTAL",zone:"Estella",er:"E"},{name:"APT TXAPITELA",zone:"Estella",er:""},{name:"MAISONAVE",zone:"Pamplona",er:""},{name:"CRISTINA P",zone:"Pamplona",er:""},{name:"SENSACIONES",zone:"Pamplona",er:""},{name:"EZKABA",zone:"Pamplona",er:""},{name:"TORRETA",zone:"Puente la Reina",er:"R"},{name:"SIF",zone:"Estella",er:"E"},{name:"KEMIRA",zone:"Estella",er:"E"},{name:"ZUMOS",zone:"Estella",er:"E"},{name:"MANCOMUNIDAD",zone:"Estella",er:"E"},{name:"UREDER",zone:"Estella",er:""},{name:"IOAR",zone:"Zona",er:""},{name:"LATORRIEN DE ANNE",zone:"Zona",er:""},{name:"R. NAVARRA",zone:"Zona",er:""}]},

    JUAN:[{name:"CASA LUISA",zone:"Ayegui",er:""},{name:"CASA JUAN",zone:"Ayegui",er:""},{name:"FLORIDA",zone:"Estella",er:""},{name:"CEPA",zone:"Estella",er:""},{name:"GANBARA",zone:"Zona",er:""},{name:"NAVARRA",zone:"Zona",er:"E"},{name:"LACAR",zone:"Lacar",er:""},{name:"CURTIDORES",zone:"Estella",er:""},{name:"UREDER",zone:"Estella",er:""},{name:"IOAR",zone:"Zona",er:""},{name:"LA TORRIEN DE ANE",zone:"Zona",er:""}]},

let plantaClients=[];
let plantaSession={};

let adminLoggedIn=false,adminDay=curDay,adminRep="WILSON";
const session={};
DAYS.forEach(d=>{session[d]={WILSON:[],JUAN:[]};});

// Load data
Promise.all([
  db.ref("routes").once("value"),
  db.ref("plantaClients").once("value")
]).then(([routeSnap,plantaSnap])=>{
  if(routeSnap.val()) routeData=routeSnap.val();
  if(plantaSnap.val()) plantaClients=Object.values(plantaSnap.val());
  syncSession();
  render();
});

function syncSession(){
  DAYS.forEach(d=>{
    ["WILSON","JUAN"].forEach(r=>{
      const n=(routeData[d]&&routeData[d][r]||[]).length;
      const cur=session[d][r]||[];
      while(cur.length<n) cur.push({done:false,sacos:0,carrosRecogidos:0,carrosEntregados:0});
      session[d][r]=cur.slice(0,n);
    });
  });
  plantaClients.forEach(c=>{
    if(!plantaSession[c.id]) plantaSession[c.id]={sacos:0,registrado:false};
  });
}

function showSaved(){
  const el=document.getElementById("saveInd");
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2000);
}

function saveToFirebase(day,rep){
  const dateStr=new Date().toISOString().slice(0,10);
  const stops=routeData[day][rep]||[];
  const st=session[day][rep]||[];
  const entries={};
  stops.forEach((s,i)=>{
    const item=st[i]||{};
    if(item.sacos>0||item.carrosRecogidos>0||item.carrosEntregados>0||item.done){
      const key=s.name.replace(/[^a-zA-Z0-9]/g,"_");
      entries[key]={cliente:s.name,zona:s.zone,sacos:item.sacos||0,carrosRecogidos:item.carrosRecogidos||0,carrosEntregados:item.carrosEntregados||0,completado:item.done||false,servicio:s.er||"",repartidor:rep,dia:day,fecha:dateStr,timestamp:Date.now()};
    }
  });
  if(Object.keys(entries).length>0){
    db.ref(`historial/${dateStr}/${rep}`).update(entries).then(()=>showSaved());
  } else showSaved();
}

function savePlantaToFirebase(clientId,clientName,sacos){
  const dateStr=new Date().toISOString().slice(0,10);
  const key=clientName.replace(/[^a-zA-Z0-9]/g,"_");
  db.ref(`historial/${dateStr}/PLANTA/${key}`).set({
    cliente:clientName,sacos,repartidor:"PLANTA",dia:DAY_LABELS[curDay]||"",fecha:dateStr,timestamp:Date.now()
  }).then(()=>showSaved());
}

function opts(val,max){
  let h='<option value="0">— 0</option>';
  for(let i=1;i<=max;i++) h+=`<option value="${i}"${val==i?" selected":""}>${i}</option>`;
  return h;
}

function erBadgeStyle(er){
  if(er==="E") return "background:#D6EAF8;color:#1A5276";
  if(er==="R") return "background:#FADBD8;color:#922B21";
  if(er==="E/R") return "background:#D5F5E3;color:#145A32";
  return "";
}

/* ---- RENDER ---- */
function render(){
  // Day tabs (only for ruta views)
  const showDays=curRep!=="PLANTA";
  document.getElementById("dayTabs").style.display=showDays?"flex":"none";
  if(showDays){
    document.getElementById("dayTabs").innerHTML=DAYS.map(d=>{
      const st=session[d][curRep]||[];
      const stops=routeData[d]&&routeData[d][curRep]||[];
      const allDone=stops.length>0&&st.filter(s=>s.done).length===stops.length;
      return`<button class="day-tab${d===curDay?" active":""}" onclick="setDay('${d}')">${DAY_LABELS[d]}${allDone?" ✓":""}</button>`;
    }).join('');
  }

  // Rep tabs — always show all 3
  document.getElementById("repTabs").innerHTML=`
    <button class="rep-tab${curRep==="WILSON"?" active wilson":""}" onclick="setRep('WILSON')">🚚 Wilson</button>
    <button class="rep-tab${curRep==="JUAN"?" active juan":""}" onclick="setRep('JUAN')">🚐 Juan</button>
    <button class="rep-tab${curRep==="PLANTA"?" active planta":""}" onclick="setRep('PLANTA')">🏭 Planta</button>`;

  if(curRep==="PLANTA"){
    renderPlanta();
  } else {
    renderRuta();
  }
}

function renderRuta(){
  const stops=routeData[curDay]&&routeData[curDay][curRep]||[];
  const st=session[curDay][curRep]||[];
  const done=st.filter(s=>s.done).length;
  const sacos=st.reduce((a,s)=>a+(s.sacos||0),0);
  const cRec=st.reduce((a,s)=>a+(s.carrosRecogidos||0),0);
  const cEnt=st.reduce((a,s)=>a+(s.carrosEntregados||0),0);
  const pct=stops.length?Math.round(done/stops.length*100):0;

  const n=routeData[curDay]&&routeData[curDay].notes||"";
  const notesHtml=n?`<div class="notes-box visible">${n}</div>`:`<div class="notes-box"></div>`;

  const stopsHtml=!stops.length?`<div class="empty-msg"><span style="font-size:40px">😴</span><br>Sin ruta este día</div>`:
    stops.map((s,i)=>{
      const item=st[i]||{done:false,sacos:0,carrosRecogidos:0,carrosEntregados:0};
      const er=s.er||"";
      return`<div class="stop-card${item.done?" done":""}">
        <div class="stop-header">
          <div class="stop-num">${item.done?"✓":i+1}</div>
          <div class="stop-info"><div class="stop-name">${s.name}</div><div class="stop-zone">📍 ${s.zone}</div></div>
          ${er?`<span class="er-badge" style="${erBadgeStyle(er)}">${er}</span>`:""}
        </div>
        <div class="service-row">
          <button class="svc-btn" onclick="setSvc(${i},'')" style="${er===""?"border-color:#999;background:#eee;color:#444":""}">—<span class="svc-label">Sin tipo</span></button>
          <button class="svc-btn" onclick="setSvc(${i},'E')" style="${er==="E"?"border-color:#2E75B6;background:#D6EAF8;color:#1A5276":""}">📦 E<span class="svc-label">Entregar</span></button>
          <button class="svc-btn" onclick="setSvc(${i},'R')" style="${er==="R"?"border-color:#C0392B;background:#FADBD8;color:#922B21":""}">🧺 R<span class="svc-label">Recoger</span></button>
          <button class="svc-btn" onclick="setSvc(${i},'E/R')" style="${er==="E/R"?"border-color:#1A6B3A;background:#D5F5E3;color:#145A32":""}">🔄 E/R<span class="svc-label">Ambos</span></button>
        </div>
        <div class="stop-inputs">
          <div class="input-group"><label>🧺 Sacos recog.</label><select onchange="upd(${i},'sacos',this.value)">${opts(item.sacos,30)}</select></div>
          <div class="input-group"><label>🛒 Carros recog.</label><select onchange="upd(${i},'carrosRecogidos',this.value)">${opts(item.carrosRecogidos,20)}</select></div>
          <div class="input-group"><label>📦 Carros entre.</label><select onchange="upd(${i},'carrosEntregados',this.value)">${opts(item.carrosEntregados,20)}</select></div>
        </div>
        <button class="check-btn" onclick="toggle(${i})">${item.done?"✅ Completado — pulsa para desmarcar":"☑️ Marcar como entregado"}</button>
      </div>`;
    }).join('');

  document.getElementById("mainContent").innerHTML=`
    <div class="summary-bar">
      <div class="summary-card"><div class="num">${done}/${stops.length}</div><div class="lbl">Paradas ${pct}%</div></div>
      <div class="summary-card"><div class="num">${sacos}</div><div class="lbl">🧺 Sacos</div></div>
      <div class="summary-card"><div class="num">${cRec}</div><div class="lbl">🛒 C.Recog.</div></div>
      <div class="summary-card"><div class="num">${cEnt}</div><div class="lbl">📦 C.Entre.</div></div>
    </div>
    ${notesHtml}
    <div class="stop-list">${stopsHtml}</div>`;
}

function renderPlanta(){
  const totalSacos=Object.values(plantaSession).reduce((a,s)=>a+(s.sacos||0),0);
  const totalReg=Object.values(plantaSession).filter(s=>s.registrado).length;
  const dateStr=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});

  const clientCards=plantaClients.length?plantaClients.map(c=>{
    const ps=plantaSession[c.id]||{sacos:0,registrado:false};
    return`<div class="planta-client-card${ps.registrado?" registrado":""}">
      <div class="planta-client-header">
        <div class="planta-client-icon">${ps.registrado?"✓":"👤"}</div>
        <div class="planta-client-name">${c.name}</div>
        <button class="planta-del-btn" onclick="plantaDelClient('${c.id}')">✕</button>
      </div>
      ${ps.registrado
        ?`<div class="planta-registered-info">✅ Registrado — ${ps.sacos} saco${ps.sacos!==1?"s":""}</div>`
        :`<div class="planta-sacos-row">
            <label>🧺 Sacos:</label>
            <select class="planta-sacos-select" id="sacos_${c.id}">${opts(ps.sacos,50)}</select>
          </div>
          <button class="planta-register-btn" onclick="plantaRegistrar('${c.id}','${c.name}')">📥 Registrar entrada</button>`
      }
    </div>`;
  }).join(''):`<div class="empty-msg"><span style="font-size:36px">📋</span><br>Sin clientes en planta<br><span style="font-size:13px">Añade el primero abajo</span></div>`;

  document.getElementById("mainContent").innerHTML=`
    <div class="planta-view">
      <div class="planta-header">
        <h2>🏭 Recepción en Planta</h2>
        <p>Álvaro · ${dateStr}</p>
      </div>
      <div class="planta-summary">
        <div class="planta-summary-card"><div class="num">${totalReg}/${plantaClients.length}</div><div class="lbl">Clientes hoy</div></div>
        <div class="planta-summary-card"><div class="num">${totalSacos}</div><div class="lbl">🧺 Sacos hoy</div></div>
      </div>
      <div class="planta-add-box">
        <h3>➕ Añadir cliente de planta</h3>
        <input class="planta-input" id="plantaNewName" placeholder="Nombre del cliente" autocomplete="off">
        <button class="planta-add-btn" onclick="plantaAddClient()">➕ Añadir cliente</button>
      </div>
      ${clientCards}
    </div>`;
}

function plantaAddClient(){
  const name=document.getElementById("plantaNewName").value.trim().toUpperCase();
  if(!name) return;
  const id="c_"+Date.now();
  const client={id,name};
  plantaClients.push(client);
  plantaSession[id]={sacos:0,registrado:false};
  db.ref("plantaClients/"+id).set(client).then(()=>{
    document.getElementById("plantaNewName").value="";
    renderPlanta();
    showSaved();
  });
}

function plantaDelClient(id){
  const c=plantaClients.find(x=>x.id===id);
  if(!c||!confirm(`¿Eliminar "${c.name}" de planta?`)) return;
  plantaClients=plantaClients.filter(x=>x.id!==id);
  delete plantaSession[id];
  db.ref("plantaClients/"+id).remove().then(()=>{renderPlanta();showSaved();});
}

function plantaRegistrar(id,name){
  const sacos=parseInt(document.getElementById("sacos_"+id).value)||0;
  plantaSession[id]={sacos,registrado:true};
  savePlantaToFirebase(id,name,sacos);
  renderPlanta();
}

function setSvc(i,val){
  routeData[curDay][curRep][i].er=val;
  db.ref("routes").set(routeData).then(()=>{showSaved();renderRuta();});
}
function setDay(d){curDay=d;render();}
function setRep(r){curRep=r;render();}
function toggle(i){session[curDay][curRep][i].done=!session[curDay][curRep][i].done;saveToFirebase(curDay,curRep);renderRuta();}
function upd(i,f,v){
  session[curDay][curRep][i][f]=parseInt(v);
  saveToFirebase(curDay,curRep);
  renderRuta();
}

/* ---- ADMIN ---- */
function openAdmin(){document.getElementById("adminOverlay").classList.add("open");adminLoggedIn?renderAdminPanel():renderLogin();}
function closeAdmin(){document.getElementById("adminOverlay").classList.remove("open");}
function renderLogin(){
  document.getElementById("adminTitle").textContent="⚙️ Administración";
  document.getElementById("adminBody").innerHTML=`
    <p style="font-size:14px;color:#555;margin-bottom:12px">Introduce la contraseña de administrador.</p>
    <div class="login-err" id="loginErr">Contraseña incorrecta</div>
    <input type="password" class="form-input" id="passInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">Entrar</button>`;
  setTimeout(()=>document.getElementById("passInput").focus(),100);
}
function doLogin(){
  if(document.getElementById("passInput").value===PASS){adminLoggedIn=true;renderAdminPanel();}
  else document.getElementById("loginErr").style.display="block";
}
function erOptClass(cur,val){
  if(val===""&&cur==="") return "er-opt sel-none";
  if(val==="E"&&cur==="E") return "er-opt sel-e";
  if(val==="R"&&cur==="R") return "er-opt sel-r";
  if(val==="E/R"&&cur==="E/R") return "er-opt sel-er";
  return "er-opt";
}
function renderAdminPanel(){
  document.getElementById("adminTitle").textContent="⚙️ Gestión de rutas";
  const clients=routeData[adminDay]&&routeData[adminDay][adminRep]||[];
  const dayOpts=DAYS.map(d=>`<option value="${d}"${d===adminDay?" selected":""}>${d}</option>`).join('');
  const repOpts=["WILSON","JUAN"].map(r=>`<option value="${r}"${r===adminRep?" selected":""}>${r}</option>`).join('');
  const clientList=clients.length?clients.map((c,i)=>{
    const er=c.er||"";
    return`<div class="client-item" style="flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px;width:100%">
        <div class="client-item-num">${i+1}</div>
        <div class="order-btns">
          <button class="order-btn" onclick="moveClient(${i},-1)" ${i===0?"disabled":""}>▲</button>
          <button class="order-btn" onclick="moveClient(${i},1)" ${i===clients.length-1?"disabled":""}>▼</button>
        </div>
        <div class="client-item-info"><div class="client-item-name">${c.name}</div><div class="client-item-zone">📍 ${c.zone}</div></div>
        <button class="del-btn" onclick="deleteClient(${i})">✕</button>
      </div>
      <div style="width:100%;padding-left:8px;margin-top:6px">
        <div style="font-size:11px;color:#888;margin-bottom:4px;font-weight:500">Servicio:</div>
        <div class="er-selector">
          <button class="${erOptClass(er,"")}" onclick="setClientEr(${i},'')">— Sin tipo</button>
          <button class="${erOptClass(er,"E")}" onclick="setClientEr(${i},'E')">📦 E</button>
          <button class="${erOptClass(er,"R")}" onclick="setClientEr(${i},'R')">🧺 R</button>
          <button class="${erOptClass(er,"E/R")}" onclick="setClientEr(${i},'E/R')">🔄 E/R</button>
        </div>
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:16px;color:#aaa;font-size:13px">Sin clientes este día</div>`;

  document.getElementById("adminBody").innerHTML=`
    <div class="admin-section">
      <h3>📋 Día y repartidor</h3>
      <div class="selector-row">
        <select class="form-select" onchange="adminDay=this.value;renderAdminPanel()">${dayOpts}</select>
        <select class="form-select" onchange="adminRep=this.value;renderAdminPanel()">${repOpts}</select>
      </div>
    </div>
    <div class="admin-section">
      <h3>➕ Añadir cliente</h3>
      <input class="form-input" id="newName" placeholder="Nombre del cliente" autocomplete="off">
      <input class="form-input" id="newZone" placeholder="Zona o dirección" autocomplete="off">
      <select class="form-select" id="newEr">
        <option value="">Sin tipo</option>
        <option value="E">E — Solo entrega</option>
        <option value="R">R — Solo recogida</option>
        <option value="E/R">E/R — Entregar y recoger</option>
      </select>
      <button class="add-btn" onclick="addClient()">➕ Añadir cliente</button>
      <div class="success-msg" id="addOk">✅ Cliente añadido</div>
    </div>
    <div class="admin-section">
      <h3>👥 Orden y servicio (${clients.length} clientes)</h3>
      <div class="hint-box">▲ ▼ para ordenar · Pulsa el servicio para cambiarlo</div>
      ${clientList}
    </div>
    <div class="admin-section">
      <h3>📌 Nota del día</h3>
      <textarea class="notes-edit-area" id="notesEdit">${routeData[adminDay]&&routeData[adminDay].notes||""}</textarea>
      <button class="btn-primary" style="margin-top:8px" onclick="saveNotes()">💾 Guardar nota</button>
      <div class="success-msg" id="notesOk">✅ Nota guardada</div>
    </div>
    <div class="admin-section">
      <button class="btn-primary btn-red" onclick="if(confirm('¿Cerrar sesión?')){adminLoggedIn=false;closeAdmin()}">🔒 Cerrar sesión</button>
    </div>`;
}
function setClientEr(idx,val){routeData[adminDay][adminRep][idx].er=val;db.ref("routes").set(routeData).then(()=>{renderAdminPanel();if(curRep!=="PLANTA")renderRuta();});}
function moveClient(idx,dir){
  const arr=routeData[adminDay][adminRep];
  const ni=idx+dir;
  if(ni<0||ni>=arr.length) return;
  const tmp=arr[idx];arr[idx]=arr[ni];arr[ni]=tmp;
  syncSession();
  db.ref("routes").set(routeData).then(()=>{renderAdminPanel();if(curRep!=="PLANTA")renderRuta();});
}
function addClient(){
  const name=document.getElementById("newName").value.trim().toUpperCase();
  const zone=document.getElementById("newZone").value.trim();
  const er=document.getElementById("newEr").value;
  if(!name){document.getElementById("newName").focus();return;}
  if(!routeData[adminDay][adminRep]) routeData[adminDay][adminRep]=[];
  routeData[adminDay][adminRep].push({name,zone:zone||"—",er});
  syncSession();
  db.ref("routes").set(routeData).then(()=>{
    document.getElementById("addOk").classList.add("show");
    setTimeout(()=>document.getElementById("addOk").classList.remove("show"),2000);
    document.getElementById("newName").value="";
    document.getElementById("newZone").value="";
    renderAdminPanel();if(curRep!=="PLANTA")renderRuta();
  });
}
function deleteClient(idx){
  const c=routeData[adminDay][adminRep][idx];
  if(!confirm(`¿Eliminar "${c.name}"?`)) return;
  routeData[adminDay][adminRep].splice(idx,1);
  syncSession();
  db.ref("routes").set(routeData).then(()=>{renderAdminPanel();if(curRep!=="PLANTA")renderRuta();});
}
function saveNotes(){
  routeData[adminDay].notes=document.getElementById("notesEdit").value.trim();
  db.ref("routes").set(routeData).then(()=>{
    document.getElementById("notesOk").classList.add("show");
    setTimeout(()=>document.getElementById("notesOk").classList.remove("show"),2000);
    if(curRep!=="PLANTA")renderRuta();
  });
}

/* ---- HISTORIAL ---- */
function openHist(){document.getElementById("histOverlay").classList.add("open");renderHist();}
function closeHist(){document.getElementById("histOverlay").classList.remove("open");}
function renderHist(){
  document.getElementById("histBody").innerHTML=`
    <div class="hist-filters">
      <select id="histFilter" onchange="loadHist()">
        <option value="week">Esta semana</option>
        <option value="month">Este mes</option>
        <option value="all">Todo el historial</option>
      </select>
      <select id="histRep" onchange="loadHist()">
        <option value="all">Todos</option>
        <option value="WILSON">Wilson</option>
        <option value="JUAN">Juan</option>
        <option value="PLANTA">Planta</option>
      </select>
    </div>
    <div id="histContent"><div class="loading-msg">⏳ Cargando datos...</div></div>`;
  loadHist();
}
function loadHist(){
  const filter=document.getElementById("histFilter").value;
  const rep=document.getElementById("histRep").value;
  document.getElementById("histContent").innerHTML=`<div class="loading-msg">⏳ Cargando...</div>`;
  db.ref("historial").once("value").then(snap=>{
    const data=snap.val()||{};
    const today=new Date();
    const rows=[];
    Object.entries(data).forEach(([fecha,reps])=>{
      const d=new Date(fecha);
      let inc=false;
      if(filter==="all") inc=true;
      else if(filter==="month") inc=d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth();
      else if(filter==="week"){const w=new Date(today);w.setDate(today.getDate()-7);inc=d>=w&&d<=today;}
      if(!inc) return;
      Object.entries(reps).forEach(([r,clientes])=>{
        if(rep!=="all"&&r!==rep) return;
        Object.values(clientes).forEach(c=>rows.push({fecha,repartidor:r,...c}));
      });
    });
    if(!rows.length){document.getElementById("histContent").innerHTML=`<div class="hist-empty">📭 Sin datos para este periodo</div>`;return;}
    rows.sort((a,b)=>b.timestamp-a.timestamp);
    const totalSacos=rows.reduce((a,r)=>a+(r.sacos||0),0);
    const totalCRec=rows.reduce((a,r)=>a+(r.carrosRecogidos||0),0);
    const totalCEnt=rows.reduce((a,r)=>a+(r.carrosEntregados||0),0);
    const clientesUnicos=new Set(rows.map(r=>r.cliente)).size;
    const byClient={};
    rows.forEach(r=>{
      if(!byClient[r.cliente]) byClient[r.cliente]={sacos:0,cRec:0,cEnt:0};
      byClient[r.cliente].sacos+=r.sacos||0;
      byClient[r.cliente].cRec+=r.carrosRecogidos||0;
      byClient[r.cliente].cEnt+=r.carrosEntregados||0;
    });
    const ranking=Object.entries(byClient).sort((a,b)=>b[1].sacos-a[1].sacos).slice(0,5);
    const repLabel=r=>r==="WILSON"?"W":r==="JUAN"?"J":r==="PLANTA"?"P":"?";
    document.getElementById("histContent").innerHTML=`
      <div class="hist-totals">
        <div class="hist-total-card"><div class="hn">${totalSacos}</div><div class="hl">🧺 Sacos</div></div>
        <div class="hist-total-card"><div class="hn">${totalCRec}</div><div class="hl">🛒 C.Recog.</div></div>
        <div class="hist-total-card"><div class="hn">${totalCEnt}</div><div class="hl">📦 C.Entre.</div></div>
        <div class="hist-total-card"><div class="hn">${clientesUnicos}</div><div class="hl">👥 Clientes</div></div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:13px;font-weight:700;color:#2E4057;margin-bottom:8px">🏆 Top clientes por sacos</div>
        ${ranking.map(([n,d])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#f8f8f8;border-radius:8px;margin-bottom:5px;font-size:12px"><span style="font-weight:600">${n}</span><span style="color:#888">🧺${d.sacos} 🛒${d.cRec} 📦${d.cEnt}</span></div>`).join('')}
      </div>
      <div style="font-size:13px;font-weight:700;color:#2E4057;margin-bottom:8px">📋 Registro detallado</div>
      <div style="overflow-x:auto">
        <table class="hist-table">
          <thead><tr><th>Fecha</th><th>Cliente</th><th>Rep.</th><th>🧺</th><th>🛒</th><th>📦</th></tr></thead>
          <tbody>${rows.map(r=>`<tr><td style="white-space:nowrap">${r.fecha}</td><td style="font-weight:600">${r.cliente}</td><td>${repLabel(r.repartidor)}</td><td>${r.sacos||0}</td><td>${r.carrosRecogidos||0}</td><td>${r.carrosEntregados||0}</td></tr>`).join('')}</tbody>
        </table>
      </div>`;
  });
}

render();
</script>
